<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day Minou ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff9ec4,#ffc0cb);
overflow:hidden;
text-align:center;
color:white;
}

.container{
padding:20px;
margin-top:20vh;
}

h1{
font-size:8vw;
}

p{
font-size:5vw;
max-width:90%;
margin:auto;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:5vw;
border:none;
border-radius:30px;
background:white;
color:#ff4d88;
cursor:pointer;
}

button:hover{
background:#ffe6ef;
}

#message{
display:none;
margin-top:20px;
font-size:5vw;
}

.lily{
position:absolute;
font-size:30px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

.music{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:400px;
}

</style>
</head>

<body>

<div class="container">

<h1>Happy Women's Day Minou ❤️</h1>

<p>
To the most beautiful woman in my life 🌸
</p>

<button onclick="showLove()">Click My Heart</button>

<div id="message">
هي التي علمتني كيف أعشقها ❤️<br>
Thank you for being in my life Minou.
</div>

<br>

<button onclick="playMusic()">Play Our Song 🎵</button>

</div>

<div class="music" id="player" style="display:none;">
<iframe width="100%" height="200"
src="https://www.youtube.com/watch?v=RGzs7T75_0o&list=RDRGzs7T75_0o&start_radio=1"
title="nhabekkkkk"
frameborder="0"
allow="autoplay"
allowfullscreen>
</iframe>
</div>

<script>

function showLove(){
document.getElementById("message").style.display="block";
}

function playMusic(){
document.getElementById("player").style.display="block";
}

function createLily(){
const lily=document.createElement("div");
lily.classList.add("lily");
lily.innerHTML="🌸";
lily.style.left=Math.random()*100+"vw";
lily.style.fontSize=(20+Math.random()*30)+"px";
lily.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(lily);

setTimeout(()=>{
lily.remove();
},8000);
}

setInterval(createLily,500);

</script>
 <link rel="stylesheet" href="style.css">
 <script src="script.js"></script>
 


</body>
</html>
